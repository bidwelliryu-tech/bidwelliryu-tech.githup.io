<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>使用教程</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f8f9fc; font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif; min-height: 100vh; color: #1e1e2e; line-height: 1.5; }
        
        .navbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.03); }
        .navbar-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: #1e1e2e; }
        .brand-logo { width: 28px; height: 28px; background-image: url('favicon.png'); background-size: cover; background-position: center; border-radius: 6px; }
        .brand-name { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.02em; }
        
        .navbar-nav { display: flex; align-items: center; gap: 2rem; }
        .nav-item { list-style: none; }
        .nav-link { text-decoration: none; color: #5a5a70; font-size: 0.9rem; font-weight: 500; padding: 0.5rem 0.8rem; border-radius: 20px; transition: all 0.2s ease; }
        .nav-link:hover { background: rgba(0,0,0,0.04); color: #1e1e2e; }
        .nav-link.active { background: rgba(124,77,255,0.08); color: #7c4dff; font-weight: 600; }
        
        .menu-btn { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 8px; }
        .menu-line { width: 24px; height: 2px; background: #1e1e2e; border-radius: 1px; transition: all 0.3s ease; }
        .menu-btn.active .menu-line:nth-child(1) { transform: rotate(45deg) translateY(5px); }
        .menu-btn.active .menu-line:nth-child(2) { opacity: 0; }
        .menu-btn.active .menu-line:nth-child(3) { transform: rotate(-45deg) translateY(-5px); }
        
        .dropdown-menu { display: none; position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: white; border-radius: 0 0 12px 12px; padding: 0.5rem 0; z-index: 99; box-shadow: 0 8px 32px rgba(0,0,0,0.08); transform: translateY(-10px); opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease; }
        .dropdown-menu.active { display: block; transform: translateY(0); opacity: 1; }
        .dropdown-menu .nav-item { opacity: 0; transform: translateY(-15px); transition: all 0.3s ease; }
        .dropdown-menu.active .nav-item:nth-child(1) { opacity: 1; transform: translateY(0); transition-delay: 0.05s; }
        .dropdown-menu.active .nav-item:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 0.1s; }
        .dropdown-menu.active .nav-item:nth-child(3) { opacity: 1; transform: translateY(0); transition-delay: 0.15s; }
        .dropdown-menu.active .nav-item:nth-child(4) { opacity: 1; transform: translateY(0); transition-delay: 0.2s; }
        .dropdown-menu .nav-link { display: block; padding: 0.75rem 1.5rem; margin: 0; border-radius: 0; }
        .dropdown-menu .nav-link.active { color: #9333ea; font-weight: 600; background: transparent; }
        
        .main-content { padding: 4.5rem 1.5rem 3rem; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; }
        
        .page-header { margin-bottom: 2.5rem; }
        .page-title { font-size: 2rem; font-weight: 600; color: #1e1e2e; }
        .page-subtitle { font-size: 0.95rem; color: #888; margin-top: 0.5rem; }
        
        .tutorial-section { background: white; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(0,0,0,0.03); }
        .section-title { font-size: 1.15rem; font-weight: 600; color: #1e1e2e; margin-bottom: 0.75rem; }
        .section-content { font-size: 0.9rem; color: #5a5a70; line-height: 1.7; }
        
        .time-display { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 0.75rem; text-align: center; font-family: 'SF Mono', 'Monaco', monospace; font-size: 0.9rem; color: #666; border-top: 1px solid #f0f0f0; }
        
        @media (max-width: 560px) {
            .navbar { height: 56px; padding: 0 1rem; }
            .navbar-nav { display: none; }
            .menu-btn { display: flex; }
            .brand-name { font-size: 1rem; }
            .main-content { padding: 4.2rem 1rem 2rem; }
            .page-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand"><div class="brand-logo"></div><span class="brand-name">1026的小窝</span></a>
        <ul class="navbar-nav">
            <li class="nav-item"><a href="index.html" class="nav-link" id="nav-home">首页</a></li>
            <li class="nav-item"><a href="syjc.html" class="nav-link active" id="nav-tutorial">使用教程</a></li>
            <li class="nav-item"><a href="gxrz.html" class="nav-link" id="nav-log">更新日志</a></li>
            <li class="nav-item"><a href="index.html?page=about" class="nav-link" id="nav-about">关于</a></li>
        </ul>
        <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">
            <span class="menu-line"></span>
            <span class="menu-line"></span>
            <span class="menu-line"></span>
        </button>
    </nav>
    
    <ul class="dropdown-menu" id="dropdownMenu">
        <li class="nav-item"><a href="index.html" class="nav-link" id="dd-home">首页</a></li>
        <li class="nav-item"><a href="syjc.html" class="nav-link active" id="dd-tutorial">使用教程</a></li>
        <li class="nav-item"><a href="gxrz.html" class="nav-link" id="dd-log">更新日志</a></li>
        <li class="nav-item"><a href="index.html?page=about" class="nav-link" id="dd-about">关于</a></li>
    </ul>
    
    <div class="main-content">
        <div class="container">
            <header class="page-header">
                <h1 class="page-title">使用教程</h1>
                <p class="page-subtitle">如何使用本站功能</p>
            </header>
            
            <div class="tutorial-section">
                <h2 class="section-title">功能介绍</h2>
                <div class="section-content">
                    <p>本站提供了多种实用工具和功能，帮助您更高效地完成日常任务。</p>
                </div>
            </div>
            
            <div class="tutorial-section">
                <h2 class="section-title">使用方法</h2>
                <div class="section-content">
                    <p>1. 点击顶部导航栏选择不同的功能页面</p>
                    <p>2. 在首页可以查看最新动态</p>
                    <p>3. 更新日志页面记录了所有版本更新内容</p>
                    <p>4. 关于页面展示了项目信息和联系方式</p>
                </div>
            </div>
            
            <div class="tutorial-section">
                <h2 class="section-title">注意事项</h2>
                <div class="section-content">
                    <p>本站仅供学习和交流使用，请遵守相关规定。</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="time-display" id="timeDisplay">--:--:--</div>
    
    <script>
        function toggleMenu() {
            const menuBtn = document.getElementById('menuBtn');
            const dropdownMenu = document.getElementById('dropdownMenu');
            menuBtn.classList.toggle('active');
            dropdownMenu.classList.toggle('active');
        }
        
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('timeDisplay').textContent = `${hours}:${minutes}:${seconds}`;
        }
        
        updateTime();
        setInterval(updateTime, 1000);
        
        document.addEventListener('click', e => {
            const menuBtn = document.getElementById('menuBtn');
            const dropdownMenu = document.getElementById('dropdownMenu');
            if (!menuBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                menuBtn.classList.remove('active');
                dropdownMenu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
