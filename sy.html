<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>首页</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #ffffff; font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', 'Noto Sans', sans-serif; line-height: 1.5; color: #1e1e1e; min-height: 100vh; display: flex; flex-direction: column; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; padding: 0 1.5rem; }
        .welcome-card { background: #ffffff; padding: 2.8rem 0 2rem 0; box-shadow: none; border: none; opacity: 0; transform: translateY(25px); animation: riseIn 0.7s cubic-bezier(0.2, 0.9, 0.3, 1) forwards; flex: 1; display: flex; flex-direction: column; }
        @keyframes riseIn { 0% { opacity: 0; transform: translateY(25px); } 100% { opacity: 1; transform: translateY(0); } }
        .avatar-img { width: 70px; height: 70px; margin: 0 0 1.5rem 0; border-radius: 18px; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05); object-fit: cover; display: block; }
        .welcome-title { font-size: 2.5rem; font-weight: 650; letter-spacing: -0.02em; color: #1e1e2e; margin-bottom: 0.3rem; text-align: left; }
        .welcome-tagline { color: #4a4a60; margin-bottom: 0.8rem; font-size: 1rem; text-align: left; }
        .welcome-message { font-size: 0.95rem; color: #6e6e8a; border-top: 1px solid #efeff4; padding-top: 1.2rem; margin-top: 0.2rem; line-height: 1.6; text-align: left; }
        .download-hint { margin-top: 1.2rem; font-size: 0.75rem; color: #8a8a9c; text-align: left; }

        .footer-copyright { text-align: center; padding: 2rem 0 1.5rem; font-size: 0.8rem; color: #9a9ab0; border-top: 1px solid #f0f0f0; margin-top: 2rem; }
        .footer-copyright div { margin-bottom: 0.2rem; }

        @media (max-width: 560px) {
            .container { padding: 0 1.2rem; }
            .welcome-card { padding: 2rem 0 1.5rem 0; }
            .welcome-title { font-size: 2.2rem; }
            .avatar-img { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="welcome-card">
        <img src="favicon.png" alt="头像" class="avatar-img">
        <h1 class="welcome-title">1026的小窝</h1>
        <div class="welcome-tagline">自在 · 随心 · 分享</div>
        <div class="welcome-message">欢迎来到我的小窝，这里有一些实用工具与记录。</div>
        <div class="download-hint">若需下载工具 请跳转至更新日志页面</div>
    </div>
    <div class="footer-copyright">
        <div>2026 © 1026的小窝</div>
        <div>项目作者：1026</div>
    </div>
</div>
</body>
</html>
