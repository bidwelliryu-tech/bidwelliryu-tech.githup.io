<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>首页</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #ffffff; font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', 'Noto Sans', sans-serif; line-height: 1.5; color: #1e1e1e; min-height: 100vh; display: flex; flex-direction: column; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        .welcome-card { background: #ffffff; border-radius: 36px; padding: 2.8rem 2rem; box-shadow: none; border: none; text-align: center; opacity: 0; transform: translateY(25px); animation: riseIn 0.7s cubic-bezier(0.2, 0.9, 0.3, 1) forwards; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        @keyframes riseIn { 0% { opacity: 0; transform: translateY(25px); } 100% { opacity: 1; transform: translateY(0); } }
        .avatar-img { width: 90px; height: 90px; margin: 0 auto 1.5rem; border-radius: 22px; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05); object-fit: cover; display: block; }
        .welcome-title { font-size: 2.5rem; font-weight: 650; letter-spacing: -0.02em; color: #1e1e2e; margin-bottom: 0.5rem; }
        .welcome-tagline { color: #4a4a60; margin-bottom: 0.8rem; font-size: 1rem; }
        .welcome-message { font-size: 0.95rem; color: #6e6e8a; border-top: 1px solid #efeff4; padding-top: 1.2rem; margin-top: 0.2rem; line-height: 1.6; }
        .download-hint { margin-top: 1.2rem; font-size: 0.75rem; color: #8a8a9c; text-align: center; }

        .footer-black { background: #111111; color: #ffffff; text-align: center; padding: 1.8rem 1rem; width: 100%; margin-top: auto; }
        .footer-black button { background: #7c4dff; color: white; border: none; padding: 0.7rem 2.5rem; border-radius: 40px; font-size: 1rem; font-weight: 500; cursor: pointer; box-shadow: 0 6px 14px rgba(124,77,255,0.25); transition: all 0.2s; margin-bottom: 1rem; }
        .footer-black button:hover { background: #6a3de8; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(124,77,255,0.35); }
        .footer-black .copyright { font-size: 0.85rem; opacity: 0.9; letter-spacing: 0.05em; }
        .footer-black .bottom-time { font-size: 0.7rem; opacity: 0.6; margin-top: 0.6rem; font-family: 'SF Mono', monospace; }

        @media (max-width: 560px) {
            .welcome-card { padding: 2.2rem 1.5rem; }
            .welcome-title { font-size: 2.2rem; }
            .avatar-img { width: 80px; height: 80px; border-radius: 18px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="welcome-card">
        <img src="favicon.png" alt="头像" class="avatar-img">
        <h1 class="welcome-title">1026的小窝</h1>
        <div class="welcome-tagline">自在 · 随心 · 分享</div>
        <div class="welcome-message">欢迎来到我的小窝，这里有一些实用工具与记录。</div>
        <div class="download-hint">若需下载工具 请跳转至更新日志页面</div>
    </div>
    <div class="footer-black">
        <button onclick="window.top.showSponsor()">打赏支持</button>
        <div class="copyright">2026 © 1026的小窝 | 作者：1026</div>
        <div class="bottom-time" id="homeTime">--:--:--</div>
    </div>
</div>
<script>
    function updateHomeTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('homeTime').textContent = `${h}:${m}:${s}`;
    }
    updateHomeTime();
    setInterval(updateHomeTime, 1000);
</script>
</body>
</html>
