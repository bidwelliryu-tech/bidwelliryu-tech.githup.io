<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <!-- 网站图标：使用根目录下的 favicon.png -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="1026的小窝 · 一个安静温暖的角落">
  <title>1026的小窝</title>
  <style>
    /* 全局重置与高级感基调 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #232946, #0f0e17);
      background-attachment: fixed;
      font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', 'Noto Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      color: #fffffe;
      /* 细腻的噪点纹理 (高级感细节) */
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc1IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wNCIgLz48L3N2Zz4=');
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    /* 主容器：弹性居中，内容纵向排列 */
    .wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    /* ----- 所有卡片共用毛玻璃与动画初始状态 ----- */
    .main-card,
    .mini-card {
      background: rgba(20, 18, 40, 0.55);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 2.5rem;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
      opacity: 0;                        /* 初始透明 —— 配合动画实现“慢慢加载” */
      transform: translateY(24px);
      animation: cardRise 0.75s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      transition: transform 0.25s ease, box-shadow 0.3s ease;
    }

    /* 主卡片 —— 1026的小窝 核心展示 */
    .main-card {
      width: 100%;
      padding: 2.8rem 1.8rem 2.8rem 1.8rem;
      text-align: center;
      border-radius: 3rem;
      background: rgba(22, 20, 45, 0.5);
      backdrop-filter: blur(18px) saturate(200%);
      -webkit-backdrop-filter: blur(18px) saturate(200%);
      border: 1px solid rgba(210, 180, 255, 0.12);
      box-shadow: 0 30px 50px -20px #00000080, 0 0 0 1px rgba(200, 180, 255, 0.05) inset;
      animation-delay: 0.05s;            /* 极轻微延迟，更有层次 */
    }

    /* 主标题 —— 优雅大气的字体表现 */
    .main-title {
      font-size: clamp(2.8rem, 12vw, 4.2rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #f3e9ff 0%, #d9c9ff 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 10px rgba(150, 100, 255, 0.2);
      filter: drop-shadow(0 4px 6px #00000030);
    }

    /* 装饰副标题 / 小窝签名 */
    .sub-motto {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #b9adff;
      opacity: 0.8;
      margin-top: 0.2rem;
      margin-bottom: 0.8rem;
      word-spacing: 0.5em;
    }

    .divider {
      margin: 1.2rem auto 0.8rem;
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #a18aff, #c3b2ff, transparent);
      border-radius: 2px;
    }

    /* 主卡片底部的一行描述 —— 更温馨 */
    .welcome-note {
      font-size: 0.95rem;
      color: #d3cef0;
      opacity: 0.8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.6rem;
    }

    .welcome-note span {
      background: rgba(255, 255, 255, 0.05);
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      font-size: 0.8rem;
    }

    /* ----- 下方小卡片组 (三个卡片, 慢慢加载 + 交错延迟) ----- */
    .card-set {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
    }

    .mini-card {
      flex: 1 1 130px;
      min-width: 110px;
      padding: 1.2rem 0.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-radius: 2rem;
      background: rgba(28, 25, 50, 0.45);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border: 1px solid rgba(220, 200, 255, 0.1);
      box-shadow: 0 12px 28px -10px #00000060;
      transition: all 0.25s;
      opacity: 0;                        /* 配合动画 */
      transform: translateY(20px);
      animation: cardRise 0.7s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }

    /* 交错动画延迟 —— 打造逐个浮现的高级感 */
    .mini-card:nth-of-type(1) { animation-delay: 0.18s; }
    .mini-card:nth-of-type(2) { animation-delay: 0.3s; }
    .mini-card:nth-of-type(3) { animation-delay: 0.42s; }

    /* 悬停效果 (仅PC端有微妙抬升) */
    @media (hover: hover) {
      .main-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 32px 55px -15px #0b0b1f, 0 0 0 1px rgba(210, 180, 255, 0.2) inset;
      }
      .mini-card:hover {
        transform: translateY(-5px) scale(1.02);
        background: rgba(40, 34, 70, 0.6);
        border-color: rgba(200, 170, 255, 0.25);
        box-shadow: 0 20px 30px -12px #00000080;
      }
    }

    /* 小卡片内的图标 (emoji / 字符) */
    .card-emoji {
      font-size: 2.2rem;
      line-height: 1.2;
      margin-bottom: 0.4rem;
      filter: drop-shadow(0 4px 6px #00000030);
    }

    .mini-card h3 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #efeaff;
      margin-bottom: 0.25rem;
    }

    .mini-card p {
      font-size: 0.8rem;
      color: #b6aee0;
      font-weight: 400;
      opacity: 0.85;
    }

    /* 自定义数字徽章 (模拟数据) */
    .badge-num {
      display: inline-block;
      background: rgba(130, 100, 220, 0.2);
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #cfc2ff;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      margin-top: 0.5rem;
    }

    /* 入场动画定义 —— 柔和升起 */
    @keyframes cardRise {
      0% {
        opacity: 0;
        transform: translateY(28px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 移动端优化：小卡片在极窄屏下堆叠更美观 */
    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }
      .wrapper {
        gap: 1.2rem;
      }
      .main-card {
        padding: 2.2rem 1.2rem;
        border-radius: 2.5rem;
      }
      .card-set {
        gap: 0.8rem;
      }
      .mini-card {
        min-width: 100px;
        padding: 1rem 0.3rem;
        border-radius: 1.8rem;
      }
      .card-emoji {
        font-size: 1.8rem;
      }
      .mini-card h3 {
        font-size: 1rem;
      }
    }

    /* 针对超小屏 (如 iPhone SE) 进一步微调 */
    @media (max-width: 380px) {
      .main-title {
        font-size: 2.5rem;
      }
      .sub-motto {
        font-size: 0.8rem;
        letter-spacing: 0.2em;
      }
      .mini-card {
        min-width: 85px;
      }
    }

    /* 优雅的footer占位 (极简) */
    .footer-note {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      opacity: 0.5;
      letter-spacing: 0.1em;
      color: #beb6e8;
      text-align: center;
    }

    /* 可选的加载完成后的光晕微细节 */
    .main-card::after {
      content: "";
      position: absolute;
      top: 10%;
      left: 5%;
      width: 30%;
      height: 20%;
      background: radial-gradient(circle, rgba(210, 180, 255, 0.2) 0%, transparent 80%);
      filter: blur(30px);
      z-index: -1;
      opacity: 0.5;
      pointer-events: none;
    }

    .main-card {
      position: relative;
      overflow: hidden;
    }
    /* 精致光效 */
    .main-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(125deg, transparent 30%, rgba(255, 255, 255, 0.03) 60%, transparent 80%);
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <!-- 中央主卡片：1026的小窝 -->
  <div class="main-card">
    <h1 class="main-title">1026的小窝</h1>
    <div class="sub-motto">✦ 自在 · 随心 ✦</div>
    <div class="divider"></div>
    <div class="welcome-note">
      <span>☕ 今日开放</span>
      <span>✨ 保持热爱</span>
    </div>
    <!-- 微妙装饰：小窝坐标 -->
    <div style="margin-top: 1rem; font-size: 0.75rem; opacity: 0.5; letter-spacing: 2px;">🐾 1026.HOME</div>
  </div>

  <!-- 卡片组：三个信息卡片，慢慢浮现，更显层次 -->
  <div class="card-set">
    <!-- 卡片 1 —— 笔记/文章 -->
    <div class="mini-card">
      <div class="card-emoji">📝</div>
      <h3>随笔</h3>
      <p>记录灵感</p>
      <div class="badge-num">12 篇</div>
    </div>
    <!-- 卡片 2 —— 瞬间/相册 -->
    <div class="mini-card">
      <div class="card-emoji">📸</div>
      <h3>瞬间</h3>
      <p>生活切片</p>
      <div class="badge-num">8 张</div>
    </div>
    <!-- 卡片 3 —— 关于 / 小窝主人 -->
    <div class="mini-card">
      <div class="card-emoji">🧸</div>
      <h3>关于</h3>
      <p>小窝主人</p>
      <div class="badge-num">1026</div>
    </div>
  </div>
  
  <!-- 极简脚标 (仅装饰) -->
  <div class="footer-note">
    <span>⚡ 慢慢加载 · 温柔相遇 ⚡</span>
  </div>
</div>

<!-- 说明：此模板完全自包含，图标引用根目录 favicon.png -->
<!-- 高级毛玻璃 + 交错卡片动画，移动端/PC 自适应 -->
</body>
</html>
