<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <!-- 网站图标：根目录 favicon.png -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta name="theme-color" content="#f5f5f7">
  <title>1026的小窝</title>
  <style>
    /* 全局重置 ———— 纯白高级基调 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f8f9fc;  /* 柔和白底 */
      font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', 'Noto Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      color: #1e1e2a;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* 主容器 — 卡片式居中 */
    .container {
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ----- 右上角「关于」独立放置 (不占用卡片动画) ----- */
    .about-corner {
      align-self: flex-end;
      margin-bottom: 0.5rem;
      margin-right: 0.3rem;
      opacity: 0;                        /* 缓慢升起动画 */
      transform: translateY(16px);
      animation: softRise 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      animation-delay: 0.1s;
    }

    .about-link {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #2c2c3a;
      text-decoration: none;
      border: 1px solid rgba(0, 0, 0, 0.04);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02);
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      background: rgba(255, 255, 255, 0.8);
    }

    .about-link:hover {
      background: white;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
      border-color: rgba(0, 0, 0, 0.08);
    }

    /* ----- 主卡片：承载头像 + 1026 + 底部操作 (毛玻璃白) ----- */
    .main-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 42px;
      padding: 2.5rem 1.8rem 2rem;
      width: 100%;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.02), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      border: 1px solid rgba(255, 255, 255, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;                        /* 整体缓慢升起 */
      transform: translateY(26px);
      animation: softRise 0.8s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
      animation-delay: 0.05s;
    }

    /* 缓慢升起动画 (统一) */
    @keyframes softRise {
      0% { opacity: 0; transform: translateY(28px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ----- 头像区域 (圆形 + 缓慢升起) ----- */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.8rem;
    }

    /* 头像上方的「项目作者」小字 */
    .author-label {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7c7c8f;
      margin-bottom: 0.5rem;
      font-weight: 450;
      opacity: 0.8;
    }

    /* 圆形头像容器 ———— 缓慢升起单独动画 (配合主面板，但为了层次感再加一点延迟) */
    .avatar-frame {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.12), 0 0 0 4px rgba(255, 255, 255, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.9rem;
      border: 1px solid rgba(0, 0, 0, 0.03);
      transition: transform 0.25s;
      opacity: 0;                       /* 独立动画，稍后出现 */
      transform: translateY(18px);
      animation: softRise 0.7s ease-out forwards;
      animation-delay: 0.18s;
    }

    .avatar-frame img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 2px solid white;
      background: #f0f0f5; /* 图片加载时的占位背景 */
    }

    /* 头像下方 —— 1026 (大号，干净) */
    .nickname-1026 {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #1e1e2e;
      line-height: 1.1;
      margin-top: 0.2rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 6px rgba(0,0,0,0.02);
      opacity: 0;
      transform: translateY(12px);
      animation: softRise 0.65s ease-out forwards;
      animation-delay: 0.25s;
    }

    /* 一条极淡的分隔 (优雅) */
    .divider-light {
      width: 60px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #c0bcd0, transparent);
      margin: 0.2rem 0 1.2rem 0;
      opacity: 0.4;
    }

    /* ----- 底部小卡片 (官方群 + 邮箱) 完全符合图2感觉 ----- */
    .contact-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 1.5rem 1.2rem;
      margin-top: 0.6rem;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 18px -6px rgba(0, 0, 0, 0.04);
      opacity: 0;
      transform: translateY(20px);
      animation: softRise 0.7s ease-out forwards;
      animation-delay: 0.4s;
    }

    /* 两列布局 (移动端自动换列) */
    .contact-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem 1rem;
      justify-content: space-around;
    }

    .contact-item {
      flex: 1 1 160px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    /* 带图标的标题行 */
    .item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    /* 所有图标均设为圆形 (QQ群 & 谷歌邮箱) */
    .icon-circle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(0, 0, 0, 0.02);
      overflow: hidden;    /* 保证圆形裁剪 */
    }

    .icon-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 针对谷歌邮箱绿幕 — 使用白色底 + 混合模式尽量弱化绿边 (视觉上更干净) */
    .gmail-icon {
      background-color: white;
    }
    .gmail-icon img {
      mix-blend-mode: multiply;   /* 让绿色背景与白色混合，视觉上减弱绿幕感 */
      background: white;
    }

    .item-label {
      font-weight: 600;
      font-size: 1rem;
      color: #20202a;
      letter-spacing: -0.01em;
    }

    /* 邮箱地址文本 */
    .email-address {
      font-size: 0.9rem;
      color: #3a3a50;
      margin: 0.25rem 0 0.2rem;
      word-break: break-all;
      font-weight: 450;
    }

    /* 括号小字 */
    .mute-note {
      font-size: 0.7rem;
      color: #8a8a9c;
      margin-top: 0.1rem;
      letter-spacing: 0.2px;
    }

    /* 链接样式 */
    .contact-link {
      text-decoration: none;
      color: inherit;
      display: inline-block;
    }
    .contact-link:hover .item-label {
      color: #3f3f70;
      text-decoration: underline;
    }

    /* 邮箱点击区域 (直接包裹) */
    .mail-link {
      text-decoration: none;
      color: #1e1e2e;
      transition: opacity 0.15s;
    }
    .mail-link:hover {
      opacity: 0.7;
    }

    /* 调整间距 */
    .qq-item .item-header {
      margin-bottom: 4px;
    }

    /* 移动端优化 */
    @media (max-width: 480px) {
      body { padding: 0.8rem; }
      .main-panel { padding: 2rem 1.2rem 1.8rem; border-radius: 36px; }
      .avatar-frame { width: 100px; height: 100px; }
      .nickname-1026 { font-size: 2.6rem; }
      .contact-card { padding: 1.2rem 1rem; }
      .contact-row { flex-direction: column; gap: 1.2rem; }
      .contact-item { width: 100%; }
    }

    /* 极细腻的交互反馈 */
    .avatar-frame:hover {
      transform: scale(1.01);
    }

    /* 整个页面没有多余内容，纯粹干净 */
    .footer-placeholder {
      height: 4px;
    }

    /* 关于按钮点击无实际链接 (仅示意) */
    .about-link {
      cursor: default;  /* 按需求，无跳转，只是样式 */
    }
  </style>
</head>
<body>
<div class="container">
  <!-- 右上角「关于」模仿图1 -->
  <div class="about-corner">
    <span class="about-link">关于</span>
  </div>

  <!-- 主面板：所有核心内容 (缓慢加载动画已在CSS定义) -->
  <div class="main-panel">
    <!-- 头像区域 -->
    <div class="avatar-section">
      <div class="author-label">项目作者</div>   <!-- 头像上方的文字 -->
      <div class="avatar-frame">
        <!-- 根目录 toxiang.png 圆形头像 -->
        <img src="toxiang.png" alt="头像" loading="lazy">
      </div>
      <!-- 头像下方显示 1026 -->
      <div class="nickname-1026">1026</div>
    </div>

    <!-- 极细分割线 (干净) -->
    <div class="divider-light"></div>

    <!-- 底部小卡片：QQ群 + 邮箱 (完全遵照图2风格) -->
    <div class="contact-card">
      <div class="contact-row">
        <!-- 加入官方QQ群 -->
        <div class="contact-item qq-item">
          <a href="https://qm.qq.com/q/YGLgFSFzyY" target="_blank" rel="noopener noreferrer" class="contact-link" style="display: block;">
            <div class="item-header">
              <div class="icon-circle">
                <img src="QQquan.png" alt="QQ群图标">
              </div>
              <span class="item-label">加入官方QQ群</span>
            </div>
          </a>
          <!-- 不需要额外文字，符合简洁 -->
        </div>

        <!-- 联系反馈 · 邮箱 -->
        <div class="contact-item">
          <div class="item-header">
            <div class="icon-circle gmail-icon">
              <!-- 谷歌邮箱图标 (绿幕，已用 multiply 混合) -->
              <img src="gugeyouxiang.png" alt="Gmail">
            </div>
            <span class="item-label">联系反馈</span>
          </div>
          <!-- 邮箱地址可点击 mailto -->
          <a href="mailto:bidwelliryu@gmail.com" class="mail-link">
            <div class="email-address">bidwelliryu@gmail.com</div>
          </a>
          <!-- 括号内提示 (无事勿扰，来意请直说) -->
          <div class="mute-note">（无事勿扰，来意请直说）</div>
        </div>
      </div>
    </div>
    <!-- 极简留白 -->
    <div style="height: 0.2rem;"></div>
  </div>
  <!-- 没有任何多余卡片，只有1026小窝该有的内容 -->
  <div class="footer-placeholder"></div>
</div>

<!-- 
  设计说明：
  - 完全白色高级基调，摒弃深色。
  - 右上角“关于”，仅作示意。
  - 头像 toxiang.png 圆形，缓慢升起。
  - 头像上方“项目作者”，下方“1026”。
  - 底部卡片：QQ群图标 QQquan.png、谷歌邮箱 gugeyouxiang.png（绿幕用mix-blend-mode辅助）。
  - 邮箱下方附带提示文字。
  - 所有动画柔和渐进，移动/PC自适应。
  - 网站图标 favicon.png 已在head中调用。
-->
</body>
</html>
